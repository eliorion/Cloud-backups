# garage-fleet SOPS config — a SEPARATE TRUST DOMAIN from the prod cluster.
#
# ⚠️ This is NOT the prod cluster's .sops.yaml. The backup tier deliberately uses
#    its OWN age recipients (doc 09 §2/§8, ADR-1; doc 10/13 Phase 0). NEVER reuse
#    the prod cluster's staging (age137z0k…) or production (age1heestk…) keys
#    here, and never encrypt a fleet secret to a cluster key or vice versa.
#
# Recipients here are managed by scripts/fleet (the TUI): it replaces the
# *_PLACEHOLDER_REPLACE_ME tokens with the real fleet recipient and each node's
# ssh-to-age recipient as you prepare a node, then re-encrypts (`sops updatekeys`).
# To do it by hand: uncomment a node's `&node_X` anchor + its `*node_X`
# references, fill the recipient, then run `sops updatekeys` on the affected files.
#
# Whole-file encryption (no encrypted_regex): these are flat key/value secret
# files consumed by sops-nix, not k8s Secret manifests, so EVERY value is
# encrypted. sops encrypts to AGE recipients; the committed secrets/*.enc.yaml
# files ARE the encrypted artifacts you push (CLAUDE.md: real sops files MUST be
# committed — a flake copies only git-tracked files into the store).

keys:
  # Workstation/operator fleet identity (age-keygen). scripts/fleet fills this
  # from private-keys/garage-fleet.txt (fallback $HOME/.config/sops/age/garage-fleet.txt).
  - &fleet_workstation age10hwqc2pzwt8gmm6ve63mnmtfwmenzcm94hy8jksl5e8klpcweuestal7jn

  # Per-node recipients = each node's DEDICATED age key (age-keygen), private half
  # in private-keys/node-<x>-age.txt (gitignored), seeded at install to
  # /var/lib/sops-nix/key.txt on the node's TPM-encrypted root (modules/sops.nix
  # age.keyFile). NOT ssh-to-age of the host key any more: sops-nix's bundled
  # ssh-to-age conversion could not decrypt at boot (see doc 14 / commit log).
  - &node_a age1t4h2699hdzd2rjfduvm3s9tceqfucuam5akwt7xu47vmjn6tx3uqeelr4y
  - &node_b age12eqajn9nzwhskcuy93d46keltk6qdhtxc3hraah9p8c9hknz9uns6s0hwq
  - &node_c age1y5vehn69vjc9u3l8kamzpadh2swzc9mhm59xfagnf2elulqakq6sapqulh
  - &node_d age1unchdjydy09xzg63lagpdq9xxe2aunh8wqegfq80k9dll2cxjphqdpnkzx

creation_rules:
  # Shared cluster secrets (rpc_secret, admin/metrics tokens) — identical on every
  # node. Encrypted to the workstation AND every node so any node can decrypt them.
  - path_regex: secrets/common\.enc\.ya?ml$
    key_groups:
      - age:
          - *fleet_workstation
          - *node_a
          - *node_b
          - *node_c
          - *node_d

  # PER-NODE secrets: tailscale-authkey (cluster-join credential, doc 09 §8),
  # root_password_hash (console rescue), zfs-passphrase (only if zfsAutoUnlock).
  # ONE file per node, encrypted to ONLY that node + the workstation, so a leaked
  # node key has minimal blast radius and node-B's root password cannot open node-A.
  # ⚠️ These rules are matched TOP-DOWN, first match wins: `node-a.enc.yaml` must
  #    stay ABOVE any broader `node-.*` pattern, or a node file would be encrypted
  #    to the wrong recipients.
  - path_regex: secrets/node-a\.enc\.ya?ml$
    key_groups:
      - age:
          - *fleet_workstation
          - *node_a
  - path_regex: secrets/node-b\.enc\.ya?ml$
    key_groups:
      - age:
          - *fleet_workstation
          - *node_b
  - path_regex: secrets/node-c\.enc\.ya?ml$
    key_groups:
      - age:
          - *fleet_workstation
          - *node_c
  - path_regex: secrets/node-d\.enc\.ya?ml$
    key_groups:
      - age:
          - *fleet_workstation
          - *node_d
